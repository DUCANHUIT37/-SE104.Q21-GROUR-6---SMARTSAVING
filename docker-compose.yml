version: '3.8'

services:
  backend:
    build:
      context: ./backend_src/Backend_SmartSaving/Backend_SmartSaving
      dockerfile: Dockerfile
    container_name: smartsaving_backend
    ports:
      - "8080:8080"
    # Đọc cấu hình bảo mật từ file .env trong backend.
    # Người clone phải copy .env.example thành .env và điền mật khẩu.
    env_file:
      - ./backend_src/Backend_SmartSaving/Backend_SmartSaving/.env
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartsaving_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped
