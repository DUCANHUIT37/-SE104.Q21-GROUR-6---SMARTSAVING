spring.application.name=demo
# ===============================
# CẤU HÌNH KẾT NỐI DATABASE MYSQL
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/smart_savings?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Ho_Chi_Minh
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# CẤU HÌNH JPA / HIBERNATE
# ===============================
# In ra các câu lệnh SQL trên console để dễ debug
spring.jpa.show-sql=true

# Tự động cập nhật cấu trúc bảng nếu có thay đổi trong code Java
spring.jpa.hibernate.ddl-auto=update

# Khai báo loại CSDL đang dùng là MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect